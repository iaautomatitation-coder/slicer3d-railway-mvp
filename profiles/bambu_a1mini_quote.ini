# ============================================================
# PrintLab 3D — bambu_a1mini_quote.ini
# Impresora:  Bambu Lab A1 Mini · boquilla 0.4 mm
# Fuente:     bambu_real_profile.bbscfg (Bambu Studio v02.03.00.62)
# Perfil:     0.20mm Standard @BBL A1M
# Validado:   Cabello.stl — gramos error -1.2% · tiempo error +12.9%
# Uso:        prusa-slicer --load bambu_a1mini_quote.ini --export-gcode archivo.stl
# ============================================================

# ── Área de impresión ─────────────────────────────────────────
bed_shape = 0x0,180x0,180x180,0x180
max_print_height = 180

# ── G-code / firmware ─────────────────────────────────────────
gcode_flavor = marlin
use_relative_e_distances = 1
use_firmware_retraction = 0
gcode_comments = 1

# ── G-code de capas (requerido para use_relative_e_distances) ─
layer_gcode = G92 E0
start_gcode =
before_layer_gcode =
end_gcode = M104 S0\nM140 S0\nG28 X\nM84

# ── Capas ─────────────────────────────────────────────────────
layer_height = 0.2
first_layer_height = 0.2
min_layer_height = 0.08
max_layer_height = 0.28

# ── Extrusor / Filamento ──────────────────────────────────────
nozzle_diameter = 0.4
filament_diameter = 1.75
filament_density = 1.24
extrusion_multiplier = 1
extrusion_width = 0.42
external_perimeter_extrusion_width = 0.42
perimeter_extrusion_width = 0.42
infill_extrusion_width = 0.42
solid_infill_extrusion_width = 0.42
top_infill_extrusion_width = 0.42
first_layer_extrusion_width = 0.42
support_material_extrusion_width = 0.35

# ── Paredes y relleno (Standard 0.20mm @BBL A1M) ──────────────
perimeters = 2
top_solid_layers = 4
bottom_solid_layers = 4
fill_density = 15%
fill_pattern = gyroid
top_fill_pattern = monotonic
bottom_fill_pattern = monotonic
infill_overlap = 10%
infill_every_layers = 1

# ── Velocidades (mm/s) ────────────────────────────────────────
# Derivadas de G-codes reales generados por Bambu Studio Standard
perimeter_speed = 150
external_perimeter_speed = 100
infill_speed = 300
solid_infill_speed = 200
top_solid_infill_speed = 100
support_material_speed = 150
support_material_interface_speed = 100%
bridge_speed = 50
gap_fill_speed = 100
first_layer_speed = 50
travel_speed = 300
travel_speed_z = 8
max_print_speed = 500

# ── Límites de máquina (time_estimate_only) ───────────────────
# PrusaSlicer usa estos valores exclusivamente para calcular tiempo
# No modifica el G-code — solo afecta la estimación
machine_limits_usage = time_estimate_only
machine_max_feedrate_x = 500,200
machine_max_feedrate_y = 500,200
machine_max_feedrate_z = 30,30
machine_max_feedrate_e = 30,30
machine_max_acceleration_x = 20000,20000
machine_max_acceleration_y = 20000,20000
machine_max_acceleration_z = 1500,1500
machine_max_acceleration_e = 5000,5000
machine_max_acceleration_extruding = 20000,20000
machine_max_acceleration_retracting = 5000,5000
machine_max_acceleration_travel = 9000,9000
machine_max_jerk_x = 9,9
machine_max_jerk_y = 9,9
machine_max_jerk_z = 5,5
machine_max_jerk_e = 3,3
machine_min_extruding_rate = 0,0
machine_min_travel_rate = 0,0
default_acceleration = 10000
perimeter_acceleration = 5000
infill_acceleration = 10000
first_layer_acceleration = 1000
travel_acceleration = 9000

# ── Retracción — de retraction_length / retraction_speed ──────
retract_length = 0.8
retract_speed = 30
deretract_speed = 30
retract_before_travel = 1
retract_lift = 0.4
retract_lift_above = 0
retract_lift_below = 179
retract_before_wipe = 0%
wipe = 1
retract_layer_change = 1

# ── Temperatura PLA Basic @BBL A1M ────────────────────────────
temperature = 220
first_layer_temperature = 220
bed_temperature = 35
first_layer_bed_temperature = 35

# ── Cooling ───────────────────────────────────────────────────
cooling = 1
fan_always_on = 1
min_fan_speed = 100
max_fan_speed = 100
bridge_fan_speed = 100
disable_fan_first_layers = 0
fan_below_layer_time = 100
slowdown_below_layer_time = 5
min_print_speed = 10

# ── Soporte ───────────────────────────────────────────────────
support_material = 0
support_material_auto = 1
support_material_threshold = 30
support_material_pattern = rectilinear
support_material_spacing = 2.5
support_material_angle = 0
support_material_interface_layers = 2
support_material_interface_spacing = 0
support_material_contact_distance = 0.2
support_material_buildplate_only = 0

# ── Skirt / Brim ──────────────────────────────────────────────
skirts = 1
skirt_distance = 2
skirt_height = 1
brim_width = 0
brim_type = no_brim

# ── Misc ──────────────────────────────────────────────────────
complete_objects = 0
dont_support_bridges = 1
perimeter_generator = arachne
